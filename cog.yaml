build:
  gpu: true
  cuda: "12.1"
  python_version: "3.10"
  system_packages:
    - "cmake"
    - "pdsh"
    - "python3-pip"
  python_packages:
    - "torch==2.2.0"
    - "ftfy>=6.0.1"
    - "huggingface_hub>=0.11.0"
    - "jinja2==3.1.4"
    - "numpy<2.0"
    - "pybind11>=2.6.2"
    - "regex"
    - "sentencepiece"
    - "six"
    - "tiktoken>=0.1.2"
    - "tokenizers>=0.12.1"
    - "transformers==4.38.0"
    - "toml"
  run:
    - "pip install git+https://github.com/EleutherAI/DeeperSpeed.git@91d1c55ba037b5ada99ae14884dff87a4dc5b9ea#egg=deepspeed"
    - "pip install git+https://github.com/EleutherAI/lm_dataformat.git@4eec05349977071bf67fc072290b95e31c8dd836"

predict: "predict.py:Predictor"
